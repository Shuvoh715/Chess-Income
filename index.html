<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Game</title>

  <!-- Chessboard CSS -->
  <link rel="stylesheet" href="https://unpkg.com/chessboardjs@0.3.0/www/css/chessboard.css">

  <!-- Telegram -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body {
      margin: 0;
      padding: 10px;
      background: #222;
      color: white;
      text-align: center;
    }

    #board {
      width: 100%;
      max-width: 400px;
      margin: auto;
    }
  </style>
</head>

<body>

  <h2>Chess Game</h2>
  <div id="board"></div>

  <!-- JS -->
  <script src="chess.js"></script>
  <script src="https://unpkg.com/chessboardjs@0.3.0/www/js/chessboard.js"></script>

  <script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    var board = null;
    var game = new Chess();

    function onDrop(source, target) {
      var move = game.move({
        from: source,
        to: target,
        promotion: 'q'
      });

      if (move === null) return 'snapback';
    }

    function init() {
      var config = {
        draggable: true,
        position: 'start',
        onDrop: onDrop
      };

      board = Chessboard('board', config);
    }

    init();
  </script>

</body>
</html>
