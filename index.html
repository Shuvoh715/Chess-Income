<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>
</head>

<body style="margin:0; padding:10px; background:#222; color:white;">

<h2>Chess Game</h2>

<div id="board" style="max-width:400px; margin:auto;"></div>

<script>
  let tg = window.Telegram.WebApp;
  tg.expand();

  var game = new Chess();

  var board = Chessboard('board', {
    draggable: true,
    position: 'start',
    onDrop: function (source, target) {
      var move = game.move({
        from: source,
        to: target,
        promotion: 'q'
      });

      if (move === null) return 'snapback';
    }
  });
</script>

</body>
</html>
